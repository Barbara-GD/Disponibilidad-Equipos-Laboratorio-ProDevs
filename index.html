<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disponibilidad de Equipos — Laboratorio ProDevs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --garnet: #7B0000;
  --red: #C0392B;
  --red-light: #F4CCCC;
  --cream: #FAF8F5;
  --ink: #1A1A1A;
  --muted: #6B6B6B;
  --border: #E5E0D8;
  --approved: #1A6B3A;
  --approved-bg: #E8F5EE;
  --pending: #7A5800;
  --pending-bg: #FFF8E1;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

header {
  background: var(--garnet); color: white;
  padding: 28px 40px; display: flex; align-items: center; gap: 20px;
}
.header-icon {
  width: 48px; height: 48px; background: rgba(255,255,255,0.15);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
}
header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; }
header p  { font-size: 13px; opacity: 0.75; margin-top: 2px; }

.main { max-width: 1000px; margin: 0 auto; padding: 36px 24px; }

.equipo-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.tab {
  padding: 8px 18px; border: 1.5px solid var(--border); border-radius: 20px;
  background: white; font-size: 13px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; color: var(--muted); transition: all .2s;
}
.tab:hover { border-color: var(--red); color: var(--red); }
.tab.active { background: var(--garnet); border-color: var(--garnet); color: white; font-weight: 500; }

.semana-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.semana-nav h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; flex: 1; text-align: center; }
.btn-nav {
  width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border);
  background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--muted); transition: all .2s;
}
.btn-nav:hover { border-color: var(--garnet); color: var(--garnet); }

.grilla { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.grilla-header { display: grid; grid-template-columns: 64px repeat(5, 1fr); border-bottom: 1.5px solid var(--border); }
.grilla-header-cell {
  padding: 12px 8px; text-align: center; font-size: 12px; font-weight: 500;
  color: var(--muted); border-right: 1px solid var(--border);
}
.grilla-header-cell:last-child { border-right: none; }
.grilla-header-cell .dia-num { font-size: 20px; font-family: 'DM Serif Display', serif; color: var(--ink); display: block; margin-top: 2px; }
.grilla-header-cell.hoy { background: var(--red-light); }
.grilla-header-cell.hoy .dia-num { color: var(--garnet); }

.grilla-row { display: grid; grid-template-columns: 64px repeat(5, 1fr); border-bottom: 1px solid var(--border); }
.grilla-row:last-child { border-bottom: none; }
.hora-label {
  padding: 6px 8px; font-size: 11px; color: var(--muted); text-align: right;
  border-right: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: flex-end;
}
.celda { border-right: 1px solid var(--border); min-height: 44px; position: relative; padding: 3px; }
.celda:last-child { border-right: none; }
.celda.hoy { background: #FDFAF8; }

.bloque { border-radius: 5px; padding: 4px 7px; font-size: 11px; line-height: 1.3; cursor: pointer; transition: opacity .15s; overflow: hidden; }
.bloque:hover { opacity: 0.85; }
.bloque.aprobada  { background: var(--approved-bg); border-left: 3px solid var(--approved); color: var(--approved); }
.bloque.pendiente { background: var(--pending-bg);  border-left: 3px solid var(--pending);  color: var(--pending); }
.bloque strong { display: block; font-size: 11px; }
.bloque span   { opacity: 0.8; font-size: 10px; }

.tooltip {
  display: none; position: absolute; background: var(--ink); color: white;
  padding: 10px 14px; border-radius: 8px; font-size: 12px; z-index: 100;
  white-space: nowrap; top: calc(100% + 6px); left: 0; min-width: 180px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25); pointer-events: none;
}
.bloque:hover .tooltip { display: block; }

.leyenda { display: flex; gap: 20px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
.leyenda-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
.leyenda-dot { width: 12px; height: 12px; border-radius: 3px; }
.leyenda-dot.aprobada  { background: var(--approved); }
.leyenda-dot.pendiente { background: var(--pending); }

.estado-carga {
  text-align: center; padding: 32px; color: var(--muted); font-size: 13px;
  grid-column: 1 / -1;
}

.solicitar-btn {
  position: fixed; bottom: 28px; right: 28px; background: var(--garnet); color: white;
  padding: 14px 24px; border-radius: 30px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; text-decoration: none;
  box-shadow: 0 4px 20px rgba(123,0,0,0.35); display: flex; align-items: center; gap: 8px;
  transition: transform .2s, box-shadow .2s;
}
.solicitar-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(123,0,0,0.45); }

@media (max-width: 600px) {
  header { padding: 20px 16px; }
  .main  { padding: 20px 12px; }
  .grilla-header-cell .dia-num { font-size: 16px; }
  .hora-label { font-size: 10px; padding: 6px 4px; }
  .solicitar-btn { bottom: 16px; right: 16px; padding: 12px 18px; font-size: 13px; }
}
</style>
</head>
<body>

<header>
  <div class="header-icon">
    <img src="https://https://barbara-gd.github.io/Disponibilidad-Equipos-Laboratorio-ProDevs/images/logo-amtc.png"
     alt="AMTC"
     style="width:38px;height:38px;object-fit:contain;border-radius:6px;"
     onerror="this.replaceWith(document.createTextNode('🔬'))">
  </div>
  <div>
    <h1>Disponibilidad de Equipos</h1>
    <p>Laboratorio ProDevs — Ver horarios y solicitar reservas</p>
  </div>
</header>

<div class="main">
  <div class="equipo-tabs" id="equipoTabs"></div>
  <div class="semana-nav">
    <button class="btn-nav" onclick="cambiarSemana(-1)">&#8592;</button>
    <h2 id="tituloSemana"></h2>
    <button class="btn-nav" onclick="cambiarSemana(1)">&#8594;</button>
  </div>
  <div class="grilla" id="grilla"><div class="estado-carga">Cargando reservas...</div></div>
  <div class="leyenda">
    <div class="leyenda-item"><div class="leyenda-dot aprobada"></div> Reserva confirmada</div>
    <div class="leyenda-item"><div class="leyenda-dot pendiente"></div> Pendiente de aprobación</div>
  </div>
</div>

<a href="#" class="solicitar-btn" id="btnSolicitar">📅 Solicitar horario</a>

<script>
// ── CONFIGURACIÓN — editar solo esta sección ──────────────────
const EQUIPOS = [
  { id: "FBRM",              nombre: "FBRM",              form: "https://docs.google.com/forms/d/e/1FAIpQLSc6L4JUlzAUaMPN7p-g-BenOYohoXVM4L4zde38-HJOXFyHLw/viewform?usp=pp_url&entry.1448724591=FBRM" },
  { id: "Mastersizer",       nombre: "Mastersizer",       form: "https://docs.google.com/forms/d/e/1FAIpQLSc6L4JUlzAUaMPN7p-g-BenOYohoXVM4L4zde38-HJOXFyHLw/viewform?usp=pp_url&entry.1448724591=Mastersizer" },
  { id: "Microscopio óptico",nombre: "Microscopio óptico",form: "https://docs.google.com/forms/d/e/1FAIpQLSc6L4JUlzAUaMPN7p-g-BenOYohoXVM4L4zde38-HJOXFyHLw/viewform?usp=pp_url&entry.1448724591=Microscopio+%C3%B3ptico" },
  { id: "XRF",               nombre: "XRF",               form: "https://docs.google.com/forms/d/e/1FAIpQLSc6L4JUlzAUaMPN7p-g-BenOYohoXVM4L4zde38-HJOXFyHLw/viewform?usp=pp_url&entry.1448724591=XRF" },
];

// ⚠️ IMPORTANTE: esta URL debe terminar en output=csv (NO pubhtml)
// Ve a Sheets → Archivo → Publicar en la web → Hoja Form_Responses → CSV → Publicar
// La URL tendrá este formato:
// https://docs.google.com/spreadsheets/d/e/XXXXX/pub?gid=YYYYY&single=true&output=csv
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vROupCZFhkJmydG40DfVPcgA3Z0g24pSml5xGa8mp0LQJAd2YO6qxoxUVF425pugwep1TdWqoti_M8a/pub?gid=554439506&single=true&output=csv";
// ─────────────────────────────────────────────────────────────

const HORAS      = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"];
const DIAS_SHORT = ["Lun","Mar","Mié","Jue","Vie"];

let RESERVAS     = [];
let equipoActivo = EQUIPOS[0].id;
let semanaOffset = 0;

// ── CARGA DE DATOS ───────────────────────────────────────────
async function cargarReservas() {
  try {
    const res = await fetch(SHEET_CSV_URL + "&t=" + Date.now()); // evita caché
    const csv = await res.text();
    const filas = csv.trim().split("\n").slice(1);

    function limpiar(s) { return (s || "").replace(/^"|"$/g, "").trim(); }

    function normHora(h) {
      if (!h) return "00:00";
      const m = h.match(/(\d{1,2}):(\d{2})(?::\d{2})?\s*(AM|PM)?/i);
      if (!m) return "00:00";
      let hh = parseInt(m[1]);
      const mm = m[2];
      const ap = (m[3] || "").toUpperCase();
      if (ap === "PM" && hh !== 12) hh += 12;
      if (ap === "AM" && hh === 12) hh = 0;
      return String(hh).padStart(2,"0") + ":" + mm;
    }

    function normFecha(raw) {
      if (!raw) return "";
      // intentar parsear M/D/YYYY o YYYY-MM-DD
      const d = new Date(raw);
      if (!isNaN(d)) return d.toISOString().slice(0,10);
      return raw;
    }

    RESERVAS = filas.map(fila => {
      // parseo CSV robusto respetando campos entre comillas
      const cols = [];
      let cur = "", inQ = false;
      for (let c of fila) {
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur); cur = ""; }
        else { cur += c; }
      }
      cols.push(cur);

      return {
        // orden columnas: A=Timestamp B=Nombre C=Correo D=Fecha E=Proyecto F=Equipo G=HoraIni H=HoraFin I=Obs J=Estado
        solicitante: limpiar(cols[1]),
        email:       limpiar(cols[2]),
        fecha:       normFecha(limpiar(cols[3])),
        proyecto:    limpiar(cols[4]),
        equipo:      limpiar(cols[5]),
        horaIni:     normHora(limpiar(cols[6])),
        horaFin:     normHora(limpiar(cols[7])),
        estado:      limpiar(cols[9]).toUpperCase() === "APROBADA" ? "aprobada" : "pendiente",
      };
    }).filter(r => r.equipo && r.fecha);

  } catch(e) {
    console.error("Error cargando reservas:", e);
    document.getElementById("grilla").innerHTML =
      '<div class="estado-carga">⚠️ No se pudieron cargar las reservas. Verifica que el Sheet esté publicado como CSV.</div>';
    return;
  }
  renderGrilla();
}

// ── NAVEGACIÓN ───────────────────────────────────────────────
function getLunes(offset) {
  const hoy = new Date();
  const dia = hoy.getDay();
  const diff = dia === 0 ? -6 : 1 - dia;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diff + offset * 7);
  lunes.setHours(0,0,0,0);
  return lunes;
}

function formatFecha(d) { return d.toISOString().slice(0,10); }

function semanaStr(lunes) {
  const vier = new Date(lunes); vier.setDate(lunes.getDate() + 4);
  const M = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  if (lunes.getMonth() === vier.getMonth())
    return `${lunes.getDate()} – ${vier.getDate()} de ${M[lunes.getMonth()]} ${lunes.getFullYear()}`;
  return `${lunes.getDate()} ${M[lunes.getMonth()]} – ${vier.getDate()} ${M[vier.getMonth()]} ${vier.getFullYear()}`;
}

function cambiarSemana(d) { semanaOffset += d; renderGrilla(); }

function setEquipo(id) {
  equipoActivo = id;
  document.getElementById("btnSolicitar").href = EQUIPOS.find(e => e.id === id).form;
  renderTabs();
  renderGrilla();
}

// ── RENDER ───────────────────────────────────────────────────
function renderTabs() {
  document.getElementById("equipoTabs").innerHTML = EQUIPOS.map(e =>
    `<button class="tab${e.id===equipoActivo?' active':''}" onclick="setEquipo('${e.id.replace(/'/g,"\\'")}')">
      ${e.nombre}
    </button>`
  ).join("");
}

function renderGrilla() {
  const lunes = getLunes(semanaOffset);
  document.getElementById("tituloSemana").textContent = semanaStr(lunes);
  const hoy  = formatFecha(new Date());
  const dias = Array.from({length:5}, (_,i) => {
    const d = new Date(lunes); d.setDate(lunes.getDate() + i);
    return { label: DIAS_SHORT[i], fecha: formatFecha(d), esHoy: formatFecha(d) === hoy };
  });

  const reservas = RESERVAS.filter(r => r.equipo === equipoActivo);

  let html = `<div class="grilla-header">
    <div class="grilla-header-cell" style="font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--muted)">Hora</div>
    ${dias.map(d => `
      <div class="grilla-header-cell${d.esHoy?' hoy':''}">
        <span style="text-transform:uppercase;letter-spacing:.05em">${d.label}</span>
        <span class="dia-num">${parseInt(d.fecha.slice(8))}</span>
      </div>`).join("")}
  </div>`;

  HORAS.forEach((hora, hi) => {
    const siguiente = HORAS[hi+1] || "19:00";
    html += `<div class="grilla-row">
      <div class="hora-label">${hora}</div>
      ${dias.map(d => {
        const bloques = reservas.filter(r =>
          r.fecha === d.fecha && r.horaIni >= hora && r.horaIni < siguiente
        );
        return `<div class="celda${d.esHoy?' hoy':''}">
          ${bloques.map(b => `
            <div class="bloque ${b.estado}" style="position:relative">
              <strong>${b.horaIni}–${b.horaFin}</strong>
              <span>${b.solicitante}</span>
              <div class="tooltip">${b.solicitante}<br>${b.proyecto}<br>${b.horaIni}–${b.horaFin}</div>
            </div>`).join("")}
        </div>`;
      }).join("")}
    </div>`;
  });

  document.getElementById("grilla").innerHTML = html;
}

// ── INIT ─────────────────────────────────────────────────────
renderTabs();
document.getElementById("btnSolicitar").href = EQUIPOS[0].form;
cargarReservas();
setInterval(cargarReservas, 60000);
</script>
</body>
</html>
