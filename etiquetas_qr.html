<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Etiquetas QR — Laboratorio ProDevs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0ebe3;
    padding: 32px 24px;
    color: #1a1a1a;
  }

  /* Estilos de la interfaz en pantalla */
  .screen-header {
    max-width: 900px;
    margin: 0 auto 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .screen-header h1 { font-size: 22px; font-weight: 600; }
  
  .btn-print {
    background: #7B0000; color: white; border: none; padding: 10px 22px;
    border-radius: 8px; font-weight: 500; cursor: pointer; transition: 0.2s;
  }
  .btn-print:hover { background: #5a0000; }

  .config-panel {
    max-width: 900px; margin: 0 auto 32px; background: white;
    border-radius: 12px; padding: 20px 24px; border: 1px solid #e0dbd3;
  }
  .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
  .config-field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  .config-field input {
    width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 13px;
  }

  /* Diseño de la etiqueta */
  .grid {
    max-width: 900px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;
  }

  .etiqueta {
    background: white; border-radius: 12px; border: 1px solid #e0dbd3;
    overflow: hidden; display: flex; flex-direction: column; min-height: 260px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  .etiqueta-header { background: #7B0000; padding: 10px 14px; color: white; }
  .lab-name { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }

  .etiqueta-body { padding: 14px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .equipo-nombre { font-size: 14px; font-weight: 600; text-align: center; color: #1a1a1a; }
  .equipo-subtitulo { font-size: 11px; color: #888; text-align: center; }

  .qr-wrap {
    width: 120px; height: 120px; display: flex; align-items: center; justify-content: center;
    border: 1px solid #eee; border-radius: 8px; padding: 6px; background: white;
  }

  .etiqueta-footer {
    border-top: 1px solid #f0ebe3; padding: 8px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .instruccion { font-size: 9px; color: #999; line-height: 1.2; text-transform: uppercase; font-weight: 500; }
  .codigo-badge {
    font-family: 'DM Mono', monospace; font-size: 10px;
    background: #f5f0ea; color: #7B0000; padding: 3px 7px; border-radius: 4px; font-weight: 600;
  }

  /* Estilos de Impresión */
  @media print {
    .no-print { display: none !important; }
    body { background: white; padding: 0; }
    .grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 5mm; 
      padding: 10mm; 
      max-width: 100%;
    }
    .etiqueta { 
      border: 1px solid #ccc; 
      page-break-inside: avoid; 
      box-shadow: none;
    }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>

<div class="screen-header no-print">
  <div>
    <h1>Generador de Etiquetas QR</h1>
    <p>Los códigos QR pre-seleccionarán el equipo en el formulario automáticamente.</p>
  </div>
  <button class="btn-print" onclick="window.print()">Imprimir etiquetas</button>
</div>

<div class="config-panel no-print">
  <div class="config-grid">
    <div class="config-field">
      <label>Nombre del laboratorio</label>
      <input type="text" id="cfg-lab" value="Laboratorio ProDevs" oninput="regenerar()">
    </div>
    <div class="config-field">
      <label>URL base del Formulario</label>
      <input type="text" id="cfg-url" value="https://docs.google.com/forms/d/e/1FAIpQLSc6L4JUlzAUaMPN7p-g-BenOYohoXVM4L4zde38-HJOXFyHLw/viewform" oninput="regenerar()">
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
// Lista de equipos con su nombre exacto para el formulario
const EQUIPOS = [
  { codigo: "FBRM",  nombre: "FBRM",    parametro: "Tamaño de partículas y Recuento en tiempo real",  param_url: "?usp=pp_url&entry.1448724591=FBRM" },
  { codigo: "MS",    nombre: "Mastersizer",    parametro: "Distribución tamaño de partículas",  param_url: "?usp=pp_url&entry.1448724591=Mastersizer" },
  { codigo: "MO",    nombre: "Microscopio Óptico",    parametro: "Análisis Visual",  param_url: "?usp=pp_url&entry.1448724591=Microscopio+%C3%B3ptico"" },
  { codigo: "XRF",   nombre: "XRF",    parametro: "Composición Elemental",  param_url: "?usp=pp_url&entry.1448724591=XRF" },
];
function regenerar() {
  const lab  = document.getElementById('cfg-lab').value || 'Laboratorio';
  const base = document.getElementById('cfg-url').value;
  const grid = document.getElementById('grid');

  if (!grid) return;
  grid.innerHTML = '';

  EQUIPOS.forEach(eq => {
    const urlFinal = base + eq.param_url;  // ← era eq.param (incorrecto)

    const card = document.createElement('div');
    card.className = 'etiqueta';
    card.innerHTML = `
      <div class="etiqueta-header">
        <div class="lab-name">${lab}</div>
      </div>
      <div class="etiqueta-body">
        <div class="equipo-nombre">${eq.nombre}</div>
        <div class="equipo-subtitulo">${eq.parametro}</div>
        <div class="qr-wrap" id="qr-${eq.codigo}"></div>
      </div>
      <div class="etiqueta-footer">
        <div class="instruccion">Escanea para<br>reservar horario</div>
        <div class="codigo-badge">${eq.codigo}</div>
      </div>
    `;
    grid.appendChild(card);

    new QRCode(document.getElementById('qr-' + eq.codigo), {
      text: urlFinal,
      width: 110,
      height: 110,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  });
}

// Iniciar al cargar
window.onload = regenerar;
</script>
</body>
</html>
</html>
